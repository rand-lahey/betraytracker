name: Scrape betrayal mentions (DISABLED — Cloudflare Worker handles this now)

# The live site is now updated by the Cloudflare Worker (worker.js) on a cron,
# which stores data in KV instead of committing to the repo. This workflow's
# automatic schedule is therefore disabled so it stops creating commits (which
# would trigger unnecessary Cloudflare rebuilds). It can still be run manually
# from the Actions tab if you ever want to regenerate data.js/data.json locally.

on:
  workflow_dispatch:          # manual only — no automatic schedule

permissions:
  contents: write             # allow the workflow to push the updated data files

# If a run is still going when the next is due, let the new one wait rather than overlap.
concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run scraper (no API key needed)
        run: python3 news_scraper.py --timespan 1d

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js data.json
          git diff --quiet --cached || git commit -m "Update betrayal data [skip ci]"
          git push
