name: Scrape betrayal mentions

# Runs the free GDELT news scraper on a schedule, commits the updated
# data.js / data.json back to the repo, so the GitHub Pages dashboard
# always shows fresh data — even when your computer is off.

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes (UTC); GitHub may delay under load
  workflow_dispatch:          # lets you trigger a run manually from the Actions tab

permissions:
  contents: write             # allow the workflow to push the updated data files

# If a run is still going when the next is due, let the new one wait rather than overlap.
concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run scraper (no API key needed)
        run: python3 news_scraper.py --timespan 1d

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js data.json
          git diff --quiet --cached || git commit -m "Update betrayal data [skip ci]"
          git push
