name: Scrape betrayal news

# Runs the Python scraper (Google News RSS + GDELT) on GitHub's runners, where
# those free sources work — unlike Cloudflare's IPs, which they block/throttle.
# Commits the resulting data.json to the repo. The Cloudflare Worker mirrors
# that file and serves it, so commits here = fresh data on the live site.
#
# IMPORTANT: set Cloudflare Worker "Build watch paths" to EXCLUDE data.json /
# data.js, so these frequent data commits don't trigger Worker rebuilds.

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min (GitHub may delay under load)
  workflow_dispatch:          # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run scraper (stdlib only, no pip installs)
        run: python3 news_scraper.py --timespan 1d

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet --cached || git commit -m "Update betrayal data [skip ci]"
          git push
